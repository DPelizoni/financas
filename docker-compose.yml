services:
  db:
    image: mysql:8.0
    container_name: financas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financas_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: financas_db
      MANAGER_EMAILS: ${MANAGER_EMAILS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: financas-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  db_backup:
    image: mysql:8.0
    container_name: financas-db-backup
    restart: unless-stopped
    volumes:
      - "./backups:/backup"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "while true; do
        FILENAME=/backup/$$(date +%Y-%m-%d).sql;
        echo \"[$$(date)] Iniciando backup para $$FILENAME...\";
        if mysqldump -h db -u root -proot financas_db > \"$$FILENAME\"; then
          echo \"[$$(date)] Backup concluído com sucesso.\";
          find /backup -name \"*.sql\" -type f -mtime +30 -delete;
        else
          echo \"[$$(date)] ERRO: Falha ao realizar o backup.\";
        fi;
        echo \"Aguardando 24 horas para o próximo ciclo...\";
        sleep 86400;
      done"


volumes:
  mysql_data:
